<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Passant - Musical Chess</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8/assets/styles/cm-chessboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8/assets/extensions/markers/markers.css">
    <link rel="stylesheet" href="css/enpassant.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js" integrity="sha512-xRllwz2gdZciIB+AkEbeq+gVhX8VB8XsfqeFbUh+SzHlN96dEduwtTuVuc2u9EROlmW9+DwUxxlSI6gy+XvIsA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/gh/gregjopa/music.js@e18446e/music.min.js"></script>
    <script src="js/games.js"></script>
</head>
<body>
<div class="main" id="container">
    <div class="images" id="playerImages">
        <img class="playerImage" src="img/fischer.jpg" alt="Bobby Fischer" onclick="replayGame(this, 'fischer');">
        <img class="playerImage" src="img/kasparov.jpg" alt="Garry Kasparov" onclick="replayGame(this, 'kasparov');">
        <img class="playerImage" src="img/deep_blue.jpg" alt="Deep Blue" onclick="replayGame(this, 'deep blue');">
        <img class="playerImage" src="img/polgar.jpg" alt="Judit Polgar" onclick="replayGame(this, 'polgar');">
        <img class="playerImage" src="img/immortal.jpg" alt="Immortal Game" onclick="replayGame(this, 'immortal');">
    </div>
    <div class="mainBoard" id="board1"></div>
    <div id="pgn"></div>
    <span id="fen"></span>
    <span id="status"></span>
    <div id="footer">
        <a href="https://thesimplelogic.com">By Adam Fletcher</a> | 
        <a href="about.html">About</a> | 
        <a href="index.html">Home</a> | 
        <a href="https://github.com/adamf/EnPassant">Github</a> | 
        <a href="http://boston.musichackday.org/2013/index.php?page=Main+page">Music Hack Day Boston, 2013</a>
    </div>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
